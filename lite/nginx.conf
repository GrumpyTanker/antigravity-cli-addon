worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       62899;
        server_name  localhost;

        # Serve our custom UI wrapper
        location / {
            root   /opt/antigravity/html;
            index  index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }

        # Proxy ttyd and its websockets
        location /ttyd/ {
            proxy_pass http://127.0.0.1:62898;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Proxy file uploads to python backend
        location /upload {
            proxy_pass http://127.0.0.1:62897/upload;
            proxy_set_header Host $host;
            client_max_body_size 0;
        }

        # Proxy kill requests to python backend
        location /kill {
            proxy_pass http://127.0.0.1:62897/kill;
            proxy_set_header Host $host;
        }

        location /export_backup {
            proxy_pass http://127.0.0.1:62897/export_backup;
            proxy_set_header Host $host;
        }

        location /import_chunk {
            proxy_pass http://127.0.0.1:62897/import_chunk;
            proxy_set_header Host $host;
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Proxy version check and update CLI
        location /version_check {
            proxy_pass http://127.0.0.1:62897/version_check;
            proxy_set_header Host $host;
        }
        location /update_cli {
            proxy_pass http://127.0.0.1:62897/update_cli;
            proxy_set_header Host $host;
        }
    }
}
