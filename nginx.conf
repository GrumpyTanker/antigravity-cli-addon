worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       8099;
        server_name  localhost;

        # Serve our custom UI wrapper
        location / {
            root   /opt/antigravity/html;
            index  index.html;
        }

        # Proxy ttyd and its websockets
        location /ttyd/ {
            proxy_pass http://127.0.0.1:8098;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Proxy file uploads to python backend
        location /upload {
            proxy_pass http://127.0.0.1:8097/upload;
            proxy_set_header Host $host;
            client_max_body_size 100M;
        }

        # Proxy kill requests to python backend
        location /kill {
            proxy_pass http://127.0.0.1:8097/kill;
            proxy_set_header Host $host;
        }

        # Proxy version check and update CLI
        location /get_login_url {
            proxy_pass http://127.0.0.1:8097/get_login_url;
            proxy_set_header Host $host;
        }
        location /version_check {
            proxy_pass http://127.0.0.1:8097/version_check;
            proxy_set_header Host $host;
        }
        location /update_cli {
            proxy_pass http://127.0.0.1:8097/update_cli;
            proxy_set_header Host $host;
        }
    }
}
